<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Shot Timer Pro</title>
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#1f2937">
    <script src="https://cdn.tailwindcss.com"></script>
<style>
    @media print {
      body {
        background-color: white !important;
        color: black !important;
      }
      .no-print {
        display: none !important;
      }
      .printable-area {
        display: block !important;
        padding: 0 !important;
        margin: 0 !important;
        border: none !important;
        box-shadow: none !important;
        background-color: white !important;
        color: black !important;
      }
      .printable-area table {
        width: 100%;
        border-collapse: collapse;
        font-size: 12px;
      }
      .printable-area th, .printable-area td {
        border: 1px solid #ccc;
        padding: 6px;
        color: black !important;
      }
      .printable-area thead {
        background-color: #eee !important;
      }
      .printable-area h1, .printable-area h2, .printable-area p {
        color: black !important;
      }
      .printable-area .text-yellow-400 {
          color: black !important;
      }
    }
</style>
<script type="importmap">
{
  "imports": {
    "vitest/": "https://aistudiocdn.com/vitest@^4.0.9/",
    "vitest": "https://aistudiocdn.com/vitest@^4.0.9",
    "react/": "https://aistudiocdn.com/react@^19.2.0/",
    "react": "https://aistudiocdn.com/react@^19.2.0",
    "react-dom/": "https://aistudiocdn.com/react-dom@^19.2.0/",
    "dexie": "https://aistudiocdn.com/dexie@^4.2.1",
    "firebase/": "https://aistudiocdn.com/firebase@^12.6.0/",
    "recharts": "https://aistudiocdn.com/recharts@^3.4.1",
    "@vitejs/plugin-react": "https://aistudiocdn.com/@vitejs/plugin-react@^5.1.1",
    "peerjs": "https://aistudiocdn.com/peerjs@^1.5.5"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>
<body class="bg-gray-900 text-gray-100">
    <div id="root"></div>
    <script type="module" src="./index.tsx"></script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js').then(registration => {
                    console.log('SW registered: ', registration);
                }).catch(registrationError => {
                    console.log('SW registration failed: ', registrationError);
                });
            });
        }
    </script>
<script type="module" src="/index.tsx"></script>
</body>
</html>
